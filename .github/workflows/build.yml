name: build gcube-base-images

on:
  workflow_dispatch:
    inputs:
      series:
        type: choice
        options: [all, ubuntu, pytorch, tensorflow]
        default: all
      torch:
        type: choice
        options: [all, "2.8", "2.9", "2.10", "2.11"]
        default: all
      cuda:
        type: choice
        options: [all, "12.6", "12.8", "13.0"]
        default: all
      ubuntu:
        type: choice
        options: [all, "22.04", "24.04"]
        default: all
      variant:
        type: choice
        options: [all, runtime, devel]
        default: all

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  DOCKERHUB_OWNER: ${{ secrets.DOCKERHUB_OWNER }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ubuntu: ${{ steps.gen.outputs.ubuntu }}
      pytorch: ${{ steps.gen.outputs.pytorch }}
      tensorflow: ${{ steps.gen.outputs.tensorflow }}
    steps:
      - id: gen
        env:
          IN_SERIES: ${{ inputs.series }}
          IN_TORCH: ${{ inputs.torch }}
          IN_CUDA: ${{ inputs.cuda }}
          IN_UBUNTU: ${{ inputs.ubuntu }}
          IN_VARIANT: ${{ inputs.variant }}
        run: |
          python3 - >> "$GITHUB_OUTPUT" << 'PY'
          import os, json
          S = os.environ.get("IN_SERIES", "all")
          T = os.environ.get("IN_TORCH", "all")
          C = os.environ.get("IN_CUDA", "all")
          U = os.environ.get("IN_UBUNTU", "all")
          V = os.environ.get("IN_VARIANT", "all")
          PT_PATCH = {"2.8": "2.8.0", "2.9": "2.9.1", "2.10": "2.10.0", "2.11": "2.11.0"}
          CU_PATCH = {"12.6": "12.6.3", "12.8": "12.8.0", "13.0": "13.0.0"}
          def keep(sel, val):
              return sel == "all" or sel == val
          ubuntu = []
          for c in ["12.6", "12.8", "13.0"]:
              for u in ["22.04", "24.04"]:
                  for v in ["runtime", "devel"]:
                      if not keep(S, "ubuntu"): continue
                      if not keep(C, c): continue
                      if not keep(U, u): continue
                      if not keep(V, v): continue
                      ubuntu.append({"cuda": c, "patch": CU_PATCH[c], "ubuntu": u, "variant": v})
          pytorch = []
          for t in ["2.8", "2.9", "2.10", "2.11"]:
              for c in ["12.6", "12.8", "13.0"]:
                  if t == "2.8" and c == "13.0":
                      continue
                  for v in ["runtime", "devel"]:
                      if not keep(S, "pytorch"): continue
                      if not keep(T, t): continue
                      if not keep(C, c): continue
                      if not keep(V, v): continue
                      pytorch.append({"torch": t, "cuda": c, "patch": PT_PATCH[t], "variant": v})
          tensorflow = []
          if keep(S, "tensorflow"):
              tensorflow.append({"tf": "2.17", "cuda": "12.8", "ubuntu": "24.04"})
          print(f"ubuntu={json.dumps(ubuntu)}")
          print(f"pytorch={json.dumps(pytorch)}")
          print(f"tensorflow={json.dumps(tensorflow)}")
          PY

  ubuntu:
    needs: setup
    if: needs.setup.outputs.ubuntu != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.ubuntu) }}
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ubuntu
          build-args: |
            BASE_IMAGE=nvidia/cuda:${{ matrix.patch }}-cudnn-${{ matrix.variant }}-ubuntu${{ matrix.ubuntu }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gcube-ubuntu${{ matrix.ubuntu }}-cuda${{ matrix.cuda }}:${{ matrix.variant }}
            ${{ env.DOCKERHUB_OWNER }}/gcube-ubuntu${{ matrix.ubuntu }}-cuda${{ matrix.cuda }}:${{ matrix.variant }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          push: true

  pytorch:
    needs: setup
    if: needs.setup.outputs.pytorch != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.pytorch) }}
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.pytorch
          build-args: |
            BASE_IMAGE=pytorch/pytorch:${{ matrix.patch }}-cuda${{ matrix.cuda }}-cudnn9-${{ matrix.variant }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gcube-pytorch-${{ matrix.torch }}-cuda${{ matrix.cuda }}:${{ matrix.variant }}
            ${{ env.DOCKERHUB_OWNER }}/gcube-pytorch-${{ matrix.torch }}-cuda${{ matrix.cuda }}:${{ matrix.variant }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          push: true

  tensorflow:
    needs: setup
    if: needs.setup.outputs.tensorflow != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.tensorflow) }}
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.tensorflow
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/gcube-ubuntu${{ matrix.ubuntu }}-cuda${{ matrix.cuda }}:runtime
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gcube-tensorflow-${{ matrix.tf }}-cuda${{ matrix.cuda }}:runtime
            ${{ env.DOCKERHUB_OWNER }}/gcube-tensorflow-${{ matrix.tf }}-cuda${{ matrix.cuda }}:runtime
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          push: true